name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild (generate Android native project)
        working-directory: artifacts/crypto-exchange
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_API_BASE: http://31.220.91.79/api

      - name: Make Gradle wrapper executable
        working-directory: artifacts/crypto-exchange/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/crypto-exchange/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          EXPO_PUBLIC_API_BASE: http://31.220.91.79/api

      - name: Rename APK
        run: |
          mkdir -p dist
          cp artifacts/crypto-exchange/android/app/build/outputs/apk/debug/app-debug.apk \
             dist/CryptoX-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoX-APK-${{ github.run_number }}
          path: dist/CryptoX-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CryptoX APK — Build ${{ github.run_number }}"
          files: dist/CryptoX-v${{ github.run_number }}.apk
          body: |
            Automated APK build from commit ${{ github.sha }}

            **API Server:** http://31.220.91.79/api

            Install on Android:
            1. Download the APK file
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK to install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
